<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherNote - 隐私记事本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.6); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        .security-glow {
            animation: pulse-glow 3s infinite;
        }
        
        /* Editor Styles */
        .editor-content {
            min-height: calc(100vh - 300px);
            outline: none;
            line-height: 1.8;
        }
        
        .editor-content:focus {
            outline: none;
        }
        
        /* Category Colors */
        .cat-work { border-left: 3px solid #3b82f6; }
        .cat-study { border-left: 3px solid #10b981; }
        .cat-idea { border-left: 3px solid #f59e0b; }
        .cat-api { border-left: 3px solid #ef4444; }
        .cat-2fa { border-left: 3px solid #8b5cf6; }
        .cat-personal { border-left: 3px solid #ec4899; }
        
        /* Hide sensitive content */
        .sensitive-blur {
            filter: blur(8px);
            transition: filter 0.2s;
            user-select: none;
        }
        .sensitive-blur:hover {
            filter: blur(0);
            user-select: text;
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        
        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Modal Overlay */
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
        
        /* Password Strength */
        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 overflow-hidden">

    <!-- Auth Screen -->
    <div id="authScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <div class="absolute inset-0 overflow-hidden">
            <div class="absolute -top-40 -right-40 w-80 h-80 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
            <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 2s"></div>
        </div>
        
        <div class="relative w-full max-w-md p-8 glass rounded-2xl shadow-2xl m-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg security-glow">
                    <i class="fas fa-shield-alt text-2xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">CipherNote</h1>
                <p class="text-slate-400 mt-2 text-sm">端到端加密 · 隐私优先</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">用户名</label>
                    <input type="text" id="loginUsername" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="输入用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">密码</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="输入密码">
                        <button type="button" onclick="togglePassword('loginPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
                    <span id="loginText">登录</span>
                    <div id="loginSpinner" class="spinner hidden"></div>
                </button>
                <div class="flex justify-between text-sm">
                    <button type="button" onclick="showForgotPassword()" class="text-indigo-400 hover:text-indigo-300">忘记密码？</button>
                    <button type="button" onclick="toggleAuthMode()" class="text-indigo-400 hover:text-indigo-300">创建账号</button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">用户名</label>
                    <input type="text" id="regUsername" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="设置用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">邮箱</label>
                    <input type="email" id="regEmail" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">密码</label>
                    <div class="relative">
                        <input type="password" id="regPassword" required oninput="checkPasswordStrength()" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="设置强密码">
                        <button type="button" onclick="togglePassword('regPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="mt-2 h-1 bg-slate-700 rounded-full overflow-hidden">
                        <div id="passwordStrength" class="h-full transition-all duration-300"></div>
                    </div>
                    <p id="passwordHint" class="text-xs text-slate-500 mt-1">至少8位，包含大小写字母和数字</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">确认密码</label>
                    <input type="password" id="regPasswordConfirm" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="再次输入密码">
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
                    <span id="regText">注册</span>
                    <div id="regSpinner" class="spinner hidden"></div>
                </button>
                <button type="button" onclick="toggleAuthMode()" class="w-full text-center text-indigo-400 hover:text-indigo-300 text-sm">已有账号？立即登录</button>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgotForm" class="space-y-4 hidden">
                <div id="forgotStep1">
                    <label class="block text-sm font-medium text-slate-400 mb-1">注册邮箱</label>
                    <input type="email" id="forgotEmail" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="your@email.com">
                    <button type="button" onclick="sendForgotCode()" class="w-full mt-4 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all">
                        发送验证码
                    </button>
                </div>
                <div id="forgotStep2" class="hidden">
                    <label class="block text-sm font-medium text-slate-400 mb-1">验证码</label>
                    <input type="text" id="verifyCode" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all mb-4" placeholder="输入6位验证码">
                    <label class="block text-sm font-medium text-slate-400 mb-1">新密码</label>
                    <input type="password" id="newPassword" required class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all mb-4" placeholder="设置新密码">
                    <button type="button" onclick="resetPassword()" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all">
                        重置密码
                    </button>
                </div>
                <button type="button" onclick="showLogin()" class="w-full text-center text-indigo-400 hover:text-indigo-300 text-sm mt-4">返回登录</button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
            <!-- User Profile -->
            <div class="p-4 border-b border-slate-800">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold" id="userAvatar">
                        U
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold truncate" id="userName">User</div>
                        <div class="text-xs text-slate-500 flex items-center gap-1">
                            <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                            在线
                        </div>
                    </div>
                </div>
                <button onclick="syncData()" class="w-full py-2 px-3 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm flex items-center justify-center gap-2 transition-colors" id="syncBtn">
                    <i class="fas fa-sync-alt"></i>
                    <span>同步数据</span>
                </button>
            </div>

            <!-- Categories -->
            <div class="flex-1 overflow-y-auto p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">分类</h3>
                    <button onclick="showAddCategory()" class="text-slate-400 hover:text-indigo-400 transition-colors">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <nav class="space-y-1" id="categoryList">
                    <!-- Dynamic categories -->
                </nav>

                <div class="mt-6">
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">快速筛选</h3>
                    <button onclick="filterNotes('all')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300 transition-colors flex items-center gap-2">
                        <i class="fas fa-inbox w-5"></i> 全部笔记
                    </button>
                    <button onclick="filterNotes('sensitive')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300 transition-colors flex items-center gap-2">
                        <i class="fas fa-key w-5 text-red-400"></i> 敏感信息
                    </button>
                    <button onclick="filterNotes('recent')" class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300 transition-colors flex items-center gap-2">
                        <i class="fas fa-clock w-5 text-blue-400"></i> 最近编辑
                    </button>
                </div>
            </div>

            <!-- Bottom Actions -->
            <div class="p-4 border-t border-slate-800 space-y-2">
                <button onclick="showSecuritySettings()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-slate-300 transition-colors flex items-center gap-2">
                    <i class="fas fa-shield-alt w-5 text-indigo-400"></i> 安全设置
                </button>
                <button onclick="logout()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 text-red-400 transition-colors flex items-center gap-2">
                    <i class="fas fa-sign-out-alt w-5"></i> 退出登录
                </button>
            </div>
        </aside>

        <!-- Note List -->
        <div class="w-80 bg-slate-900/50 border-r border-slate-800 flex flex-col">
            <div class="p-4 border-b border-slate-800 flex items-center justify-between">
                <h2 class="font-semibold text-lg" id="currentViewTitle">全部笔记</h2>
                <button onclick="createNewNote()" class="w-8 h-8 bg-indigo-600 hover:bg-indigo-500 rounded-lg flex items-center justify-center transition-colors">
                    <i class="fas fa-plus text-white"></i>
                </button>
            </div>
            <div class="p-3 border-b border-slate-800">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="searchInput" oninput="searchNotes()" placeholder="搜索笔记..." class="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-indigo-500 text-sm">
                </div>
            </div>
            <div class="flex-1 overflow-y-auto" id="noteList">
                <!-- Dynamic notes -->
            </div>
        </div>

        <!-- Editor -->
        <main class="flex-1 flex flex-col bg-slate-950 relative">
            <div id="emptyState" class="absolute inset-0 flex items-center justify-center">
                <div class="text-center text-slate-600">
                    <i class="fas fa-feather-alt text-6xl mb-4 opacity-50"></i>
                    <p>选择一个笔记或创建新笔记</p>
                </div>
            </div>

            <div id="editor" class="hidden flex-col h-full">
                <!-- Toolbar -->
                <div class="h-16 border-b border-slate-800 flex items-center justify-between px-6 glass-strong">
                    <div class="flex items-center gap-4">
                        <select id="noteCategory" onchange="changeCategory()" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-500">
                            <!-- Dynamic options -->
                        </select>
                        <label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer hover:text-slate-300">
                            <input type="checkbox" id="sensitiveToggle" onchange="toggleSensitive()" class="rounded border-slate-600 text-indigo-600 focus:ring-indigo-500 bg-slate-800">
                            <i class="fas fa-lock text-xs"></i> 敏感信息
                        </label>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-500" id="lastSaved">未保存</span>
                        <button onclick="saveCurrentNote()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                            <i class="fas fa-save"></i> 保存
                        </button>
                        <button onclick="deleteCurrentNote()" class="px-3 py-2 text-red-400 hover:bg-red-400/10 rounded-lg text-sm transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>

                <!-- Title Input -->
                <div class="px-8 pt-6 pb-2">
                    <input type="text" id="noteTitle" placeholder="无标题笔记" class="w-full text-3xl font-bold bg-transparent border-none outline-none placeholder-slate-700 text-slate-100">
                </div>

                <!-- Content Editor -->
                <div class="flex-1 overflow-y-auto px-8 py-4">
                    <textarea id="noteContent" placeholder="开始输入..." class="w-full h-full bg-transparent border-none outline-none resize-none text-slate-300 leading-relaxed text-lg editor-content mono"></textarea>
                </div>

                <!-- Security Footer -->
                <div class="h-10 border-t border-slate-800 flex items-center px-6 gap-4 text-xs text-slate-500 bg-slate-900/30">
                    <span class="flex items-center gap-1"><i class="fas fa-lock text-green-500"></i> 端到端加密</span>
                    <span class="flex items-center gap-1"><i class="fas fa-database"></i> <span id="syncStatus">本地已保存</span></span>
                    <span id="wordCount" class="ml-auto">0 字</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Category Modal -->
    <div id="categoryModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md m-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">新建分类</h3>
            <input type="text" id="newCategoryName" placeholder="分类名称" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl mb-4 focus:outline-none focus:border-indigo-500">
            <div class="mb-4">
                <label class="block text-sm text-slate-400 mb-2">选择颜色</label>
                <div class="flex gap-3 flex-wrap">
                    <button onclick="selectCatColor('blue')" class="w-8 h-8 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent hover:ring-blue-500 transition-all cat-color-btn" data-color="blue"></button>
                    <button onclick="selectCatColor('green')" class="w-8 h-8 rounded-full bg-green-500 ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent hover:ring-green-500 transition-all cat-color-btn" data-color="green"></button>
                    <button onclick="selectCatColor('yellow')" class="w-8 h-8 rounded-full bg-yellow-500 ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent hover:ring-yellow-500 transition-all cat-color-btn" data-color="yellow"></button>
                    <button onclick="selectCatColor('red')" class="w-8 h-8 rounded-full bg-red-500 ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent hover:ring-red-500 transition-all cat-color-btn" data-color="red"></button>
                    <button onclick="selectCatColor('purple')" class="w-8 h-8 rounded-full bg-purple-500 ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent hover:ring-purple-500 transition-all cat-color-btn" data-color="purple"></button>
                    <button onclick="selectCatColor('pink')" class="w-8 h-8 rounded-full bg-pink-500 ring-2 ring-offset-2 ring-offset-slate-900 ring-transparent hover:ring-pink-500 transition-all cat-color-btn" data-color="pink"></button>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeCategoryModal()" class="flex-1 py-2 border border-slate-700 rounded-xl hover:bg-slate-800 transition-colors">取消</button>
                <button onclick="addCategory()" class="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-colors">创建</button>
            </div>
        </div>
    </div>

    <!-- Security Settings Modal -->
    <div id="securityModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-lg m-4 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <i class="fas fa-shield-alt text-indigo-400"></i> 安全中心
                </h3>
                <button onclick="closeSecurityModal()" class="text-slate-400 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <div class="space-y-6">
                <!-- Encryption Info -->
                <div class="p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                    <h4 class="font-semibold mb-2 flex items-center gap-2">
                        <i class="fas fa-key text-green-400"></i> 加密状态
                    </h4>
                    <p class="text-sm text-slate-400 mb-3">所有笔记在本地使用 AES-256-GCM 加密，服务端仅存储密文。</p>
                    <div class="flex items-center gap-2 text-xs text-slate-500 mono">
                        <span>密钥指纹:</span>
                        <span id="keyFingerprint" class="text-indigo-400">生成中...</span>
                    </div>
                </div>

                <!-- Auto Lock -->
                <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                    <div>
                        <h4 class="font-semibold mb-1">自动锁定</h4>
                        <p class="text-sm text-slate-400">离开5分钟后自动锁定应用</p>

    <script>
        // ==================== Configuration ====================
        const API_URL = 'https://auth-api.cloudstart.xyz';
        const ENCRYPTION_KEY_NAME = 'ciphernote_key';
        const DB_NAME = 'CipherNoteDB';
        const DB_VERSION = 1;
        
        // ==================== State ====================
        let db;
        let currentUser = null;
        let encryptionKey = null;
        let categories = [
            { id: 'work', name: '工作', color: 'blue', icon: 'briefcase' },
            { id: 'study', name: '学习', color: 'green', icon: 'book' },
            { id: 'idea', name: '灵感', color: 'yellow', icon: 'lightbulb' },
            { id: 'api', name: 'API Keys', color: 'red', icon: 'key', sensitive: true },
            { id: '2fa', name: '2FA 备份', color: 'purple', icon: 'shield-alt', sensitive: true },
            { id: 'personal', name: '个人', color: 'pink', icon: 'user' }
        ];
        let notes = [];
        let currentNote = null;
        let currentFilter = 'all';
        let selectedCatColor = 'blue';
        let autoLockTimer = null;
        let lastActivity = Date.now();

        // ==================== Crypto Functions ====================
        
        // Derive encryption key from password
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey(
                'raw',
                encoder.encode(password),
                'PBKDF2',
                false,
                ['deriveBits', 'deriveKey']
            );
            
            return await window.crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        // Generate or retrieve encryption key
        async function getEncryptionKey(password) {
            if (encryptionKey) return encryptionKey;
            
            const stored = localStorage.getItem(ENCRYPTION_KEY_NAME);
            const salt = stored ? 
                Uint8Array.from(atob(stored), c => c.charCodeAt(0)) : 
                window.crypto.getRandomValues(new Uint8Array(16));
            
            if (!stored) {
                localStorage.setItem(ENCRYPTION_KEY_NAME, btoa(String.fromCharCode(...salt)));
            }
            
            encryptionKey = await deriveKey(password, salt);
            return encryptionKey;
        }

        // Encrypt data
        async function encryptData(data, key) {
            const encoder = new TextEncoder();
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await window.crypto.subtle.encrypt(
                { name: 'AES-GCM', iv },
                key,
                encoder.encode(JSON.stringify(data))
            );
            
            return {
                iv: btoa(String.fromCharCode(...iv)),
                data: btoa(String.fromCharCode(...new Uint8Array(encrypted)))
            };
        }

        // Decrypt data
        async function decryptData(encryptedObj, key) {
            try {
                const iv = Uint8Array.from(atob(encryptedObj.iv), c => c.charCodeAt(0));
                const data = Uint8Array.from(atob(encryptedObj.data), c => c.charCodeAt(0));
                
                const decrypted = await window.crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv },
                    key,
                    data
                );
                
                const decoder = new TextDecoder();
                return JSON.parse(decoder.decode(decrypted));
            } catch (e) {
                console.error('Decryption failed:', e);
                return null;
            }
        }

        // ==================== Database ====================
        
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('notes')) {
                        db.createObjectStore('notes', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('categories')) {
                        db.createObjectStore('categories', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('sync')) {
                        db.createObjectStore('sync', { keyPath: 'id' });
                    }
                };
            });
        }

        async function saveToDB(storeName, data) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function getFromDB(storeName, id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = id ? store.get(id) : store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteFromDB(storeName, id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // ==================== Auth API ====================
        
        async function register(username, email, password) {
            const res = await fetch(`${API_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            return await res.json();
        }

        async function login(username, password) {
            const res = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                await getEncryptionKey(password);
            }
            return data;
        }

        async function getCurrentUser() {
            const token = localStorage.getItem('token');
            if (!token) return { success: false, error: '未登录' };
            
            const res = await fetch(`${API_URL}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            return await res.json();
        }

        async function forgotPassword(email) {
            const res = await fetch(`${API_URL}/api/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            return await res.json();
        }

        async function verifyCode(email, code) {
            const res = await fetch(`${API_URL}/api/auth/verify-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, code })
            });
            return await res.json();
        }

        async function resetPassword(resetToken, newPassword) {
            const res = await fetch(`${API_URL}/api/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ resetToken, newPassword })
            });
            return await res.json();
        }

        async function deleteAccount() {
            const token = localStorage.getItem('token');
            const res = await fetch(`${API_URL}/api/auth/user`, {
                method: 'DELETE',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            if (res.success) {
                logout();
            }
            return await res.json();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem(ENCRYPTION_KEY_NAME);
            encryptionKey = null;
            location.reload();
        }

        // ==================== UI Functions ====================
        
        function togglePassword(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const strengthBar = document.getElementById('passwordStrength');
            const hint = document.getElementById('passwordHint');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'h-full transition-all duration-300 ';
            if (strength <= 1) {
                strengthBar.classList.add('strength-weak');
                hint.textContent = '密码强度：弱';
                hint.className = 'text-xs text-red-400 mt-1';
            } else if (strength === 2) {
                strengthBar.classList.add('strength-medium');
                hint.textContent = '密码强度：中';
                hint.className = 'text-xs text-yellow-400 mt-1';
            } else {
                strengthBar.classList.add('strength-strong');
                hint.textContent = '密码强度：强';
                hint.className = 'text-xs text-green-400 mt-1';
            }
        }

        function toggleAuthMode() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        function showForgotPassword() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.remove('hidden');
            document.getElementById('forgotStep1').classList.remove('hidden');
            document.getElementById('forgotStep2').classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('forgotForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        async function sendForgotCode() {
            const email = document.getElementById('forgotEmail').value;
            if (!email) return showToast('请输入邮箱', 'error');
            
            const res = await forgotPassword(email);
            if (res.success) {
                showToast('验证码已发送', 'success');
                document.getElementById('forgotStep1').classList.add('hidden');
                document.getElementById('forgotStep2').classList.remove('hidden');
            } else {
                showToast(res.error || '发送失败', 'error');
            }
        }

        async function resetPassword() {
            const email = document.getElementById('forgotEmail').value;
            const code = document.getElementById('verifyCode').value;
            const newPass = document.getElementById('newPassword').value;
            
            const verifyRes = await verifyCode(email, code);
            if (!verifyRes.success) return showToast('验证码错误', 'error');
            
            const resetRes = await resetPassword(verifyRes.resetToken, newPass);
            if (resetRes.success) {
                showToast('密码重置成功，请登录', 'success');
                showLogin();
            } else {
                showToast(resetRes.error || '重置失败', 'error');
            }
        }

        // Auth Event Listeners
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');
            btn.textContent = '登录中...';
            spinner.classList.remove('hidden');
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const res = await login(username, password);
            if (res.success) {
                await initApp(res.user);
            } else {
                showToast(res.error || '登录失败', 'error');
                btn.textContent = '登录';
                spinner.classList.add('hidden');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            
            if (password !== confirm) return showToast('两次密码不一致', 'error');
            if (password.length < 8) return showToast('密码至少8位', 'error');
            
            const btn = document.getElementById('regText');
            const spinner = document.getElementById('regSpinner');
            btn.textContent = '注册中...';
            spinner.classList.remove('hidden');
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            
            const res = await register(username, email, password);
            if (res.success) {
                showToast('注册成功，请登录', 'success');
                toggleAuthMode();
                document.getElementById('loginUsername').value = username;
            } else {
                showToast(res.error || '注册失败', 'error');
            }
            btn.textContent = '注册';
            spinner.classList.add('hidden');
        });

        // ==================== App Functions ====================
        
        async function initApp(user) {
            currentUser = user;
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userName').textContent = user.username;
            document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();
            
            await initDB();
            await loadCategories();
            await loadNotes();
            renderCategories();
            renderNotes();
            
            // Generate key fingerprint
            const keyData = await window.crypto.subtle.exportKey('raw', encryptionKey);
            const hash = await window.crypto.subtle.digest('SHA-256', keyData);
            const fingerprint = Array.from(new Uint8Array(hash)).slice(0, 4).map(b => b.toString(16).padStart(2, '0')).join(':');
            document.getElementById('keyFingerprint').textContent = fingerprint;
            
            // Setup auto lock
            setupAutoLock();
            showToast(`欢迎回来，${user.username}`, 'success');
        }

        async function loadCategories() {
            const saved = await getFromDB('categories');
            if (saved && saved.length > 0) {
                categories = saved;
            } else {
                // Save default categories
                for (const cat of categories) {
                    await saveToDB('categories', cat);
                }
            }
        }

        async function loadNotes() {
            const saved = await getFromDB('notes');
            if (saved) {
                // Decrypt notes
                notes = [];
                for (const note of saved) {
                    const decrypted = await decryptData(note.encrypted, encryptionKey);
                    if (decrypted) {
                        notes.push({ ...decrypted, id: note.id, updatedAt: note.updatedAt });
                    }
                }
                notes.sort((a, b) => b.updatedAt - a.updatedAt);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoryList');
            container.innerHTML = '';
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-2 group cat-${cat.color}`;
                btn.onclick = () => filterNotes(cat.id);
                btn.innerHTML = `
                    <i class="fas fa-${cat.icon} w-5 text-${cat.color}-400"></i>
                    <span class="flex-1">${cat.name}</span>
                    <span class="text-xs text-slate-500 bg-slate-800 px-2 py-0.5 rounded-full group-hover:bg-slate-700">
                        ${notes.filter(n => n.category === cat.id).length}
                    </span>
                `;
                container.appendChild(btn);
            });
            
            // Update category select in editor
            const select = document.getElementById('noteCategory');
            select.innerHTML = categories.map(c => 
                `<option value="${c.id}">${c.name}</option>`
            ).join('');
        }

        function renderNotes() {
            const container = document.getElementById('noteList');
            container.innerHTML = '';
            
            let filtered = notes;
            if (currentFilter === 'sensitive') {
                filtered = notes.filter(n => n.sensitive);
            } else if (currentFilter === 'recent') {
                filtered = notes.slice(0, 10);
            } else if (currentFilter !== 'all') {
                filtered = notes.filter(n => n.category === currentFilter);
            }
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(n => 
                    n.title.toLowerCase().includes(searchTerm) || 
                    n.content.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-600">
                        <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                        <p class="text-sm">暂无笔记</p>
                    </div>
                `;
                return;
            }
            
            filtered.forEach(note => {
                const div = document.createElement('div');
                div.className = `p-4 border-b border-slate-800 hover:bg-slate-800/50 cursor-pointer transition-colors group ${currentNote?.id === note.id ? 'bg-slate-800/50 border-l-2 border-l-indigo-500' : ''}`;
                div.onclick = () => openNote(note);
                
                const category = categories.find(c => c.id === note.category) || categories[0];
                const date = new Date(note.updatedAt).toLocaleDateString('zh-CN');
                
                div.innerHTML = `
                    <div class="flex items-start justify-between mb-1">
                        <h4 class="font-medium text-slate-200 truncate pr-2 ${note.sensitive ? 'text-red-300' : ''}">
                            ${note.sensitive ? '<i class="fas fa-lock text-xs mr-1"></i>' : ''}
                            ${note.title || '无标题'}
                        </h4>
                        <span class="text-xs text-slate-500 whitespace-nowrap">${date}</span>
                    </div>
                    <p class="text-sm text-slate-500 line-clamp-2 ${note.sensitive ? 'sensitive-blur' : ''}">
                        ${note.content || '无内容'}
                    </p>
                    <div class="mt-2 flex items-center gap-2">
                        <span class="text-xs px-2 py-0.5 rounded bg-slate-800 text-${category.color}-400 border border-slate-700">
                            ${category.name}
                        </span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function createNewNote() {
            currentNote = {
                id: crypto.randomUUID(),
                title: '',
                content: '',
                category: categories[0].id,
                sensitive: false,
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
            
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('editor').classList.remove('hidden');
            document.getElementById('editor').classList.add('flex');
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('noteCategory').value = currentNote.category;
            document.getElementById('sensitiveToggle').checked = false;
            document.getElementById('lastSaved').textContent = '未保存';
            
            updateWordCount();
            renderNotes();
        }

        function openNote(note) {
            currentNote = note;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('editor').classList.remove('hidden');
            document.getElementById('editor').classList.add('flex');
            document.getElementById('noteTitle').value = note.title;
            document.getElementById('noteContent').value = note.content;
            document.getElementById('noteCategory').value = note.category;
            document.getElementById('sensitiveToggle').checked = note.sensitive || false;
            document.getElementById('lastSaved').textContent = new Date(note.updatedAt).toLocaleString('zh-CN');
            
            updateWordCount();
            renderNotes();
        }

        async function saveCurrentNote() {
            if (!currentNote) return;
            
            currentNote.title = document.getElementById('noteTitle').value;
            currentNote.content = document.getElementById('noteContent').value;
            currentNote.category = document.getElementById('noteCategory').value;
            currentNote.sensitive = document.getElementById('sensitiveToggle').checked;
            currentNote.updatedAt = Date.now();
            
            // Encrypt and save
            const encrypted = await encryptData({
                title: currentNote.title,
                content: currentNote.content,
                category: currentNote.category,
                sensitive: currentNote.sensitive,
                createdAt: currentNote.createdAt
            }, encryptionKey);
            
            await saveToDB('notes', {
                id: currentNote.id,
                encrypted: encrypted,
                updatedAt: currentNote.updatedAt
            });
            
            // Update notes array
            const idx = notes.findIndex(n => n.id === currentNote.id);
            if (idx >= 0) {
                notes[idx] = currentNote;
            } else {
                notes.unshift(currentNote);
            }
            
            document.getElementById('lastSaved').textContent = '已保存 ' + new Date().toLocaleTimeString('zh-CN');
            document.getElementById('syncStatus').textContent = '待同步';
            renderNotes();
            showToast('笔记已保存', 'success');
        }

        async function deleteCurrentNote() {
            if (!currentNote) return;
            if (!confirm('确定要删除这条笔记吗？此操作不可恢复。')) return;
            
            await deleteFromDB('notes', currentNote.id);
            notes = notes.filter(n => n.id !== currentNote.id);
            currentNote = null;
            
            document.getElementById('editor').classList.add('hidden');
            document.getElementById('editor').classList.remove('flex');
            document.getElementById('emptyState').classList.remove('hidden');
            
            renderNotes();
            showToast('笔记已删除', 'info');
        }

        function changeCategory() {
            if (currentNote) {
                currentNote.category = document.getElementById('noteCategory').value;
                saveCurrentNote();
            }
        }

        function toggleSensitive() {
            if (currentNote) {
                currentNote.sensitive = document.getElementById('sensitiveToggle').checked;
                saveCurrentNote();
            }
        }

        function filterNotes(filter) {
            currentFilter = filter;
            const titles = {
                'all': '全部笔记',
                'sensitive': '敏感信息',
                'recent': '最近编辑'
            };
            document.getElementById('currentViewTitle').textContent = titles[filter] || categories.find(c => c.id === filter)?.name || '笔记';
            renderNotes();
        }

        function searchNotes() {
            renderNotes();
        }

        function updateWordCount() {
            const content = document.getElementById('noteContent').value;
            document.getElementById('wordCount').textContent = content.length + ' 字';
        }

        document.getElementById('noteContent').addEventListener('input', updateWordCount);

        // ==================== Category Management ====================
        
        function showAddCategory() {
            document.getElementById('categoryModal').classList.remove('hidden');
            document.getElementById('newCategoryName').value = '';
            selectCatColor('blue');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.add('hidden');
        }

        function selectCatColor(color) {
            selectedCatColor = color;
            document.querySelectorAll('.cat-color-btn').forEach(btn => {
                if (btn.dataset.color === color) {
                    btn.classList.add('ring-' + color + '-500');
                    btn.classList.remove('ring-transparent');
                } else {
                    btn.classList.remove('ring-' + btn.dataset.color + '-500');
                    btn.classList.add('ring-transparent');
                }
            });
        }

        async function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            if (!name) return showToast('请输入分类名称', 'error');
            
            const newCat = {
                id: 'cat_' + Date.now(),
                name: name,
                color: selectedCatColor,
                icon: 'folder'
            };
            
            categories.push(newCat);
            await saveToDB('categories', newCat);
            renderCategories();
            closeCategoryModal();
            showToast('分类已创建', 'success');
        }

        // ==================== Security & Sync ====================
        
        function showSecuritySettings() {
            document.getElementById('securityModal').classList.remove('hidden');
        }

        function closeSecurityModal() {
            document.getElementById('securityModal').classList.add('hidden');
        }

        async function syncData() {
            const btn = document.getElementById('syncBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>同步中...</span>';
            btn.disabled = true;
            
            try {
                // Get all encrypted notes
                const encryptedNotes = await getFromDB('notes');
                const token = localStorage.getItem('token');
                
                // Upload to server
                const res = await fetch(`${API_URL}/api/notes/sync`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        notes: encryptedNotes,
                        timestamp: Date.now()
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    document.getElementById('syncStatus').textContent = '已同步';
                    showToast('数据同步成功', 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                showToast('同步失败: ' + e.message, 'error');
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        function setupAutoLock() {
            // Reset timer on activity
            ['mousedown', 'keydown', 'touchstart', 'scroll'].forEach(event => {
                document.addEventListener(event, () => {
                    lastActivity = Date.now();
                    if (document.getElementById('lockScreen').classList.contains('hidden') === false) {
                        // Already locked
                    }
                }, true);
            });
            
            // Check every minute
            setInterval(() => {
                const autoLock = localStorage.getItem('autoLock') === 'true';
                if (autoLock && Date.now() - lastActivity > 5 * 60 * 1000) {
                    lockApp();
                }
            }, 60000);
        }

        function toggleAutoLock() {
            const enabled = document.getElementById('autoLock').checked;
            localStorage.setItem('autoLock', enabled);
            showToast(enabled ? '自动锁定已开启' : '自动锁定已关闭', 'info');
        }

        function lockApp() {
            document.getElementById('lockScreen').classList.remove('hidden');
        }

        function unlockApp() {
            document.getElementById('lockScreen').classList.add('hidden');
            lastActivity = Date.now();
        }

        async function exportData() {
            const data = {
                notes: await getFromDB('notes'),
                categories: await getFromDB('categories'),
                exportedAt: Date.now()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ciphernote_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('备份已下载', 'success');
        }

        async function changePassword() {
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPasswordChange').value;
            
            if (!oldPass || !newPass) return showToast('请填写完整', 'error');
            if (newPass.length < 8) return showToast('新密码至少8位', 'error');
            
            // Re-encrypt all notes with new key
            showToast('正在重新加密数据...', 'info');
            // Implementation would require re-encrypting all data
            // For now, just a placeholder
        }

        // ==================== Utilities ====================
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'} mr-2"></i>
                ${message}
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Auto save draft
        setInterval(() => {
            if (currentNote && document.getElementById('noteTitle').value !== currentNote.title) {
                // Auto save logic here
            }
        }, 30000);

        // Check existing session
        window.addEventListener('load', async () => {
            const token = localStorage.getItem('token');
            if (token) {
                const user = await getCurrentUser();
                if (user.success) {
                    // Need password to decrypt, show password prompt or logout
                    // For now, require re-login for security
                }
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.metaKey || e.ctrlKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    saveCurrentNote();
                }
            }
        });
    </script>
